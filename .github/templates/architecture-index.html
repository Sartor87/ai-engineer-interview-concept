<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Engineer Interview Guide — Architecture</title>
  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --ink: #1a202c;
      --accent: #2b6cb0;
      --muted: #718096;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
      line-height: 1.6;
    }
    h1 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; }
    h2 { color: var(--ink); margin-top: 2.5rem; }
    h3 { color: var(--accent); margin: 0 0 0.25rem; }
    .meta { color: var(--muted); font-size: 0.9rem; }
    .view {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.25rem 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .view .description { color: var(--muted); margin: 0.25rem 0 1rem; font-size: 0.95rem; }
    .mermaid {
      background: #fff;
      padding: 1rem;
      overflow-x: auto;
      text-align: center;
    }
    ul.adr-list { padding-left: 0; list-style: none; }
    ul.adr-list li {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin: 0.4rem 0;
    }
    ul.adr-list a { color: var(--accent); text-decoration: none; font-weight: 600; }
    ul.adr-list a:hover { text-decoration: underline; }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
    code {
      background: #edf2f7;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
  </style>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      flowchart: { useMaxWidth: true, htmlLabels: true },
      c4: { useMaxWidth: true }
    });
  </script>
</head>
<body>
  <h1>AI Engineer Interview Guide — Architecture</h1>
  <p class="meta">
    Auto-generated from <code>architecture/workspace.dsl</code> on every push to <code>main</code>.
    Built: <!-- BUILD_TIME -->.
  </p>

  <h2>C4 Views</h2>
  <!-- VIEWS_PLACEHOLDER -->

  <h2>Architecture Decision Records</h2>
  <ul class="adr-list">
    <!-- ADRS_PLACEHOLDER -->
  </ul>

  <footer>
    Diagrams rendered client-side via <a href="https://mermaid.js.org/">Mermaid.js</a>.
    Source: <a href="https://github.com/avisi-cloud/structurizr-site-generatr">workspace.dsl</a>.
  </footer>
</body>
</html>
